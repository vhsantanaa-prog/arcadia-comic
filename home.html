<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecionar relatório · Tráfego Pago</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050505;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 2rem 1rem;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .page-wrap { max-width: 720px; width: 100%; margin: 0 auto; }
  .dash { background: #0d0d0d; border-radius: 16px; padding: 2.5rem 1.5rem; border: 1px solid #1a1a1a; text-align: center; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fx { opacity: 0; animation: fadeUp 0.5s ease forwards; }

  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; color: #555; text-transform: uppercase; margin-bottom: 6px; }
  .title { font-size: 20px; font-weight: 600; color: #f0f0f0; margin-bottom: 32px; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: left; }
  .evcard {
    background: #181818; border-radius: 14px; padding: 1.4rem 1.2rem; border: 1px solid #222;
    text-decoration: none; display: block; cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .evcard:hover { transform: translateY(-4px); border-color: #3a3a3a; }
  .ev-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 20px; }
  .ev-name { font-size: 16px; font-weight: 600; color: #f0f0f0; letter-spacing: 0.02em; margin-bottom: 4px; }
  .ev-sub { font-size: 11.5px; color: #666; margin-bottom: 16px; }
  .ev-foot { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #262626; padding-top: 12px; }
  .ev-date { font-size: 10.5px; color: #555; }
  .ev-link { font-size: 11px; display: flex; align-items: center; gap: 4px; }

  @media (max-width: 540px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="dash">
    <div class="eyebrow fx" style="animation-delay:0s;">Relatórios de tráfego pago</div>
    <div class="title fx" style="animation-delay:.05s;">Selecione o evento</div>

    <div class="cards">
      <a href="arcadia.html" class="evcard fx" style="animation-delay:.1s; border-top: 3px solid #ffd11a;">
        <div class="ev-icon" style="background:#2a2408;"><i class="ti ti-disco" style="color:#ffd11a;" aria-hidden="true"></i></div>
        <div class="ev-name">ARCADIA</div>
        <div class="ev-sub">Relatório de tráfego pago · Meta Ads</div>
        <div class="ev-foot">
          <span class="ev-date">Atualizado 22/07</span>
          <span class="ev-link" style="color:#ffd11a;">Ver relatório<i class="ti ti-arrow-right" style="font-size:12px;" aria-hidden="true"></i></span>
        </div>
      </a>

      <a href="comic.html" class="evcard fx" style="animation-delay:.15s; border-top: 3px solid #ff4d6d;">
        <div class="ev-icon" style="background:#2a0e14;"><i class="ti ti-mask" style="color:#ff4d6d;" aria-hidden="true"></i></div>
        <div class="ev-name">COMIC</div>
        <div class="ev-sub">Relatório de tráfego pago · Meta Ads</div>
        <div class="ev-foot">
          <span class="ev-date">Atualizado 22/07</span>
          <span class="ev-link" style="color:#ff4d6d;">Ver relatório<i class="ti ti-arrow-right" style="font-size:12px;" aria-hidden="true"></i></span>
        </div>
      </a>
    </div>
  </div>
</div>
</body>
</html>
